name: Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "aiochlite/**"
      - "tests/**"
      - "pyproject.toml"
      - ".pytest.toml"
      - ".ruff.toml"
      - "pyrightconfig.json"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "aiochlite/**"
      - "tests/**"
      - "pyproject.toml"
      - ".pytest.toml"
      - ".ruff.toml"
      - "pyrightconfig.json"
      - "uv.lock"

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.3
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_DB: test
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_USER: test
      CLICKHOUSE_PASSWORD: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}
      - name: Lint code
        run: |
          uv run ruff check --output-format=github aiochlite tests
          uv run basedpyright aiochlite tests
          uv run ruff format --check --diff aiochlite tests
      - name: Wait for ClickHouse
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8123/ping > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse did not become ready" >&2
          exit 1
      - name: Run tests
        run: uv run pytest -q
